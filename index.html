<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Test Teclado">
<title>Test Teclado</title>
<style>
body { font-family: sans-serif; padding: 20px; background: #13181f; color: white; }
.btn { display: block; width: 100%; padding: 16px; background: #4d79ff; color: white; border: none; border-radius: 10px; font-size: 16px; margin-bottom: 12px; cursor: pointer; }
.overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200; display: flex; align-items: flex-end; opacity: 0; visibility: hidden; pointer-events: none; transition: opacity 0.22s, visibility 0.22s; }
.overlay.open { opacity: 1; visibility: visible; pointer-events: all; }
.modal { background: #1c2230; border-radius: 20px 20px 0 0; padding: 24px; width: 100%; }
label { display: block; font-size: 12px; color: #8b9ab4; margin-bottom: 6px; }
input { width: 100%; padding: 14px; background: #222b3a; border: 1.5px solid #3a4a65; border-radius: 9px; color: white; font-size: 16px; -webkit-appearance: none; -webkit-text-fill-color: white; color-scheme: dark; display: block; margin-bottom: 16px; }
.row { display: flex; gap: 10px; }
.row .btn { margin-bottom: 0; }
.close { background: #2a3347; }
h3 { margin-bottom: 16px; font-size: 18px; }
#log { margin-top: 20px; font-size: 11px; color: #4e5e78; }
</style>
</head>
<body>

<h2>Test iOS PWA Teclado</h2>
<p style="font-size:13px;color:#8b9ab4;margin-bottom:20px;">Prueba cada botón y comprueba si aparece el teclado al tocar el input.</p>

<button class="btn" onclick="open1()">Test 1 — Modal simple</button>
<button class="btn" onclick="open2()">Test 2 — Modal con setTimeout 300ms focus</button>
<button class="btn" onclick="open3()">Test 3 — body position:fixed antes</button>

<div id="log"></div>

<!-- MODAL 1: simple -->
<div class="overlay" id="m1">
  <div class="modal">
    <h3>Test 1 — Simple</h3>
    <label>Importe</label>
    <input type="text" inputmode="decimal" id="m1-input" placeholder="0,00">
    <div class="row">
      <button class="btn close" onclick="close1()">Cerrar</button>
    </div>
  </div>
</div>

<!-- MODAL 2: focus explícito -->
<div class="overlay" id="m2">
  <div class="modal">
    <h3>Test 2 — Focus setTimeout</h3>
    <label>Importe</label>
    <input type="text" inputmode="decimal" id="m2-input" placeholder="0,00">
    <div class="row">
      <button class="btn close" onclick="close2()">Cerrar</button>
    </div>
  </div>
</div>

<!-- MODAL 3: body fixed -->
<div class="overlay" id="m3">
  <div class="modal">
    <h3>Test 3 — Body fixed</h3>
    <label>Importe</label>
    <input type="text" inputmode="decimal" id="m3-input" placeholder="0,00">
    <div class="row">
      <button class="btn close" onclick="close3()">Cerrar</button>
    </div>
  </div>
</div>

<script>
function log(msg){ document.getElementById('log').innerHTML += '<div>'+msg+'</div>'; }

// TEST 1: modal simple, sin nada extra
function open1(){
  log('Test 1: abriendo modal sin nada extra');
  document.getElementById('m1').classList.add('open');
}
function close1(){ document.getElementById('m1').classList.remove('open'); }

// TEST 2: focus explícito con setTimeout
function open2(){
  log('Test 2: abriendo modal con focus() a los 300ms');
  document.getElementById('m2').classList.add('open');
  setTimeout(()=>{
    document.getElementById('m2-input').focus();
    log('Test 2: focus() llamado');
  }, 300);
}
function close2(){ document.getElementById('m2').classList.remove('open'); }

// TEST 3: body position:fixed
let _sy=0;
function open3(){
  log('Test 3: body position:fixed antes de abrir');
  _sy = window.scrollY;
  document.body.style.position='fixed';
  document.body.style.top=-_sy+'px';
  document.body.style.width='100%';
  document.getElementById('m3').classList.add('open');
}
function close3(){
  document.getElementById('m3').classList.remove('open');
  document.body.style.position='';
  document.body.style.top='';
  document.body.style.width='';
  window.scrollTo(0,_sy);
  log('Test 3: body restaurado');
}

// Registrar taps en inputs
['m1-input','m2-input','m3-input'].forEach(id=>{
  const el=document.getElementById(id);
  el.addEventListener('focus',()=>log(id+': FOCUS ✅'));
  el.addEventListener('blur',()=>log(id+': blur'));
  el.addEventListener('touchstart',()=>log(id+': touchstart'));
});
</script>
</body>
</html>
